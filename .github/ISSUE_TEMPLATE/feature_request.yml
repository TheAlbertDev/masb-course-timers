name: ✨ Feature Request
description: Suggest a new feature, enhancement, or improvement for the course
title: "[FEATURE] "
labels: ["enhancement", "feature-request"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea for improving the course? We'd love to hear your suggestions!

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      description: What kind of feature are you suggesting?
      options:
        - New exercise/project
        - Additional platform support
        - Enhanced documentation
        - New debugging tools/techniques
        - Additional examples
        - Improved code structure
        - Testing framework
        - Development workflow improvement
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Target Platform
      description: Which platform would this feature target?
      options:
        - Arduino
        - STM32Cube
        - Both platforms
        - Platform-independent
        - New platform

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: Describe your feature idea in detail
      placeholder: |
        What would you like to see added or improved?
        Be specific about what the feature would do and how it would work.
    validations:
      required: true

  - type: textarea
    id: problem-solution
    attributes:
      label: Problem/Use Case
      description: What problem does this feature solve or what use case does it address?
      placeholder: |
        Describe:
        - What current limitation or gap this would address
        - How students or instructors would benefit
        - What learning objectives it would support
    validations:
      required: true

  - type: textarea
    id: proposed-implementation
    attributes:
      label: Proposed Implementation
      description: If you have ideas about how this feature could be implemented, share them here
      placeholder: |
        e.g.,
        - New files that would need to be created
        - Changes to existing exercises
        - Additional hardware requirements
        - New sections in documentation
        - etc.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature for the learning experience?
      options:
        - High - Essential for course completion or understanding
        - Medium - Would significantly improve the learning experience
        - Low - Nice to have enhancement

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      description: How complex do you think this feature would be to implement?
      options:
        - Low - Simple addition or modification
        - Medium - Moderate changes required
        - High - Significant development effort
        - Unknown

  - type: textarea
    id: examples
    attributes:
      label: Examples/References
      description: Are there any examples, references, or similar implementations you can point to?
      placeholder: |
        e.g.,
        - Links to similar course materials
        - Academic papers or resources
        - Open source projects
        - Industry standards
        - etc.

  - type: checkboxes
    id: volunteer
    attributes:
      label: Implementation Support
      description: Would you be willing to help implement this feature?
      options:
        - label: I would be interested in helping implement this feature
        - label: I could help with testing/validation
        - label: I could help with documentation
        - label: I can provide subject matter expertise

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information about your feature request
      placeholder: |
        e.g.,
        - Timeline considerations
        - Dependencies on other features
        - Potential challenges or concerns
        - Alternative approaches
        - etc.
