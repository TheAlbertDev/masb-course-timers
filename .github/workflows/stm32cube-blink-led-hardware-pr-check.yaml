name: 🧪 STM32Cube blink LED hardware - PR check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  acceptance_tests:
    name: ✅ Build and Run Acceptance tests
    if: |
      !github.event.repository.is_template &&
      github.head_ref == 'stm32cube-blink-led-hardware'
    runs-on: self-hosted
    steps:
      - name: 🛡️ Get GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.THEALBERTDEVBOT_APP_ID }}
          private-key: ${{ secrets.THEALBERTDEVBOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🏗️ Build and upload STM32Cube project
        run: |
          cd ${{ github.workspace }}/stm32cube/workspace/blink-led-hardware
          rm -rf build/Debug
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_TOOLCHAIN_FILE=./cmake/gcc-arm-none-eabi.cmake -B build/Debug
          cmake --build build/Debug
          pio pkg exec -p tool-openocd -c "openocd -f interface/stlink.cfg -f target/stm32f4x.cfg -c 'program build/Debug/blink-led-hardware.elf verify reset exit'"

      - name: 🧬 Run unit tests
        env:
          CPPUTEST_HOME: /opt/cpputest
        run: |
          cd ${{ github.workspace }}/.github/tests/unit/test_blink_led_hardware/stm32cube
          make

      - name: 🧬 Run acceptance tests
        run: |
          cd ${{ github.workspace }}/.github/tests/acceptance/test_blink_led_toggle
          /usr/bin/python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          python -m pytest -v
